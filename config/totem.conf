CONFIG_ZMK_USB_LOGGING=n

# Bluetooth stability for Windows hosts and common Realtek/Intel adapters.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Keep deep sleep explicitly disabled while debugging BLE disconnects.
CONFIG_ZMK_SLEEP=n

# ZMK still enters a light idle state by default after 30 seconds. Keep the
# keyboard active longer to avoid wake-up lag while testing Bluetooth stability.
CONFIG_ZMK_IDLE_TIMEOUT=300000
